# AI Engine Deployment
{{- if .Values.aiEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-ai-engine
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  {{- if not .Values.aiEngine.autoscaling.enabled }}
  replicas: {{ .Values.aiEngine.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-sre-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-engine
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
      labels:
        {{- include "ai-sre-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-engine
    spec:
      serviceAccountName: {{ .Values.aiEngine.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: wait-for-ollama
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              until curl -f http://{{ include "ai-sre-agent.fullname" . }}-ollama:11434/api/tags; do
                echo "Waiting for Ollama to be ready..."
                sleep 5
              done
              echo "Ollama is ready!"
      containers:
        - name: ai-engine
          image: "{{ .Values.aiEngine.image.repository }}:{{ .Values.aiEngine.image.tag }}"
          imagePullPolicy: {{ .Values.aiEngine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-sre-agent.fullname" . }}-ai-engine-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.aiEngine.persistence.enabled }}
            - name: vector-store
              mountPath: {{ .Values.aiEngine.persistence.mountPath }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        {{- if .Values.aiEngine.persistence.enabled }}
        - name: vector-store
          persistentVolumeClaim:
            claimName: {{ include "ai-sre-agent.fullname" . }}-vector-store
        {{- end }}
      {{- with .Values.aiEngine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiEngine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
---
{{- if and .Values.aiEngine.enabled .Values.aiEngine.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-vector-store
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.aiEngine.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.aiEngine.persistence.size }}
{{- end }}
---
{{- if .Values.aiEngine.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-ai-engine
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.aiEngine.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-sre-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
{{- end }}
