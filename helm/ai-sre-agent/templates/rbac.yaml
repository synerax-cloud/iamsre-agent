# RBAC Resources
{{- if .Values.rbac.create }}
---
# Collector ServiceAccount
{{- if .Values.collector.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.collector.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
  {{- with .Values.collector.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-collector
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.collectorRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-collector
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-sre-agent.fullname" . }}-collector
subjects:
  - kind: ServiceAccount
    name: {{ .Values.collector.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- end }}

---
# Executor ServiceAccount
{{- if .Values.executor.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.executor.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
  {{- with .Values.executor.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-executor
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.executorRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-sre-agent.fullname" . }}-executor
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-sre-agent.fullname" . }}-executor
subjects:
  - kind: ServiceAccount
    name: {{ .Values.executor.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- end }}

---
# Backend and AI Engine ServiceAccounts (no special RBAC)
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.backend.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---
{{- if .Values.aiEngine.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.aiEngine.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
  {{- with .Values.aiEngine.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{ end }}
{{- end }}

{{- end }}
