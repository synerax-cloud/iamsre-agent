# Default values for ai-sre-agent
# This is a YAML-formatted file

global:
  projectId: "your-project-id"
  region: "us-central1"
  ingressIP: ""  # Set via --set or use values file
  domain: ""  # Optional domain name

# Namespace
namespace: ai-sre-agent

# Backend API
backend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/ai-sre-agent/backend
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
  
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  env:
    DEBUG: "false"
    ENVIRONMENT: "production"
    LLM_PROVIDER: "ollama"
    K8S_IN_CLUSTER: "true"
    LOG_LEVEL: "INFO"
    LOG_FORMAT: "json"
  
  serviceAccount:
    create: true
    name: backend
    annotations: {}

# AI Engine
aiEngine:
  enabled: true
  replicaCount: 2
  
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/ai-sre-agent/ai-engine
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8001
  
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  
  env:
    LLM_PROVIDER: "ollama"
    OLLAMA_MODEL: "llama3.1:8b"
    OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
    LOG_LEVEL: "INFO"
  
  persistence:
    enabled: true
    storageClass: "standard"
    size: "10Gi"
    mountPath: "/data/vector_db"
  
  serviceAccount:
    create: true
    name: ai-engine
    annotations: {}

# Collector
collector:
  enabled: true
  replicaCount: 1
  
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/ai-sre-agent/collector
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8002
  
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  
  env:
    K8S_IN_CLUSTER: "true"
    PROMETHEUS_URL: ""  # Set if Prometheus available
    LOG_LEVEL: "INFO"
  
  serviceAccount:
    create: true
    name: collector
    annotations: {}

# Executor
executor:
  enabled: true
  replicaCount: 1
  
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/ai-sre-agent/executor
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8003
  
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  
  env:
    K8S_IN_CLUSTER: "true"
    LOG_LEVEL: "INFO"
  
  serviceAccount:
    create: true
    name: executor
    annotations: {}

# Ollama (Self-hosted LLM)
ollama:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 11434
  
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  
  persistence:
    enabled: true
    storageClass: "standard"
    size: "50Gi"
    mountPath: "/root/.ollama"
  
  # GPU support (uncomment if available)
  # tolerations:
  #   - key: nvidia.com/gpu
  #     operator: Exists
  #     effect: NoSchedule
  # nodeSelector:
  #   cloud.google.com/gke-accelerator: nvidia-tesla-t4

# PostgreSQL (using CloudSQL Proxy)
postgresql:
  enabled: true
  useCloudSQLProxy: true
  
  cloudSQLProxy:
    image:
      repository: gcr.io/cloudsql-docker/gce-proxy
      tag: "1.33.14"
    
    connectionName: ""  # Format: project:region:instance
    
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

# Redis (optional, for caching)
redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
  
  service:
    type: ClusterIP
    port: 6379
  
  persistence:
    enabled: true
    storageClass: "standard"
    size: "5Gi"

# Ingress
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: backend
              port: 8000
  
  tls:
    - secretName: ai-sre-agent-tls
      hosts:
        - api.example.com

# RBAC
rbac:
  create: true
  
  # Collector needs read access
  collectorRules:
    - apiGroups: [""]
      resources: ["pods", "nodes", "services", "endpoints", "namespaces", "events"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs", "cronjobs"]
      verbs: ["get", "list", "watch"]
  
  # Executor needs write access
  executorRules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "delete"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets"]
      verbs: ["get", "list", "patch", "update"]
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list", "patch", "update"]

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: "30s"

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
